name: Run App

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Quote message from Slack (required)"
        required: true
      quoter:
        description: "Name of the quoter (required)"
        required: true

jobs:
  check-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image_exists: ${{ steps.check.outputs.image_exists }}
    steps:
      - name: Check if image exists in GHCR
        id: check
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if docker manifest inspect ghcr.io/${REPO}:latest > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "✓ Image found in GHCR"
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "⚠ Image not found. Will rebuild..."
          fi

  build:
    needs: check-image
    if: needs.check-image.outputs.image_exists == 'false'
    permissions:
      packages: write
    uses: ./.github/workflows/build.yml

  run:
    needs: [check-image, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pull and run citoer
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${REPO}:latest
          docker run --rm \
            -e MESSAGE="${{ github.event.inputs.message }}" \
            -e QUOTER="${{ github.event.inputs.quoter }}" \
            -e STORAGE="google_sheets" \
            -e GOOGLE_SERVICE_ACCOUNT="${{ secrets.GOOGLE_SERVICE_ACCOUNT }}" \
            -e GOOGLE_SHEETS_PAGE_NAME="${{ vars.GOOGLE_SHEETS_PAGE_NAME }}" \
            -e GOOGLE_SHEETS_SPREADSHEET_ID="${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}" \
            ghcr.io/${REPO}:latest
