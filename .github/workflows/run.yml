name: Run App

on:
  schedule:
    - cron: "0 12 * * *" # Runs daily at noon
  workflow_dispatch: # Runs when manually triggered

jobs:
  check-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image_exists: ${{ steps.check.outputs.image_exists }}
    steps:
      - name: Check if image exists in GHCR
        id: check
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if docker manifest inspect ghcr.io/${REPO}:latest > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "✓ Image found in GHCR"
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "⚠ Image not found. Will rebuild..."
          fi

  build:
    needs: check-image
    if: needs.check-image.outputs.image_exists == 'false'
    permissions:
      packages: write
    uses: ./.github/workflows/build.yml

  run:
    needs: [check-image, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pull and run citoer
        env:
          QUOTE_REGEX: ${{ vars.QUOTE_REGEX }}
          STORAGE_ADAPTER: ${{ vars.STORAGE_ADAPTER }}
          GOOGLE_SHEETS_PAGE_NAME: ${{ vars.GOOGLE_SHEETS_PAGE_NAME }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ vars.GOOGLE_SHEETS_SPREADSHEET_ID }}
          MEDIA_ADAPTER: ${{ vars.MEDIA_ADAPTER }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}

          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          docker pull ghcr.io/${REPO}:latest

          docker run --rm \
            -e QUOTE_REGEX="$QUOTE_REGEX" \
            -e STORAGE_ADAPTER="$STORAGE_ADAPTER" \
            -e GOOGLE_SERVICE_ACCOUNT="$GOOGLE_SERVICE_ACCOUNT" \
            -e GOOGLE_SHEETS_PAGE_NAME="$GOOGLE_SHEETS_PAGE_NAME" \
            -e GOOGLE_SHEETS_SPREADSHEET_ID="$GOOGLE_SHEETS_SPREADSHEET_ID" \
            -e MEDIA_ADAPTER="$MEDIA_ADAPTER" \
            -e SLACK_APP_TOKEN="$SLACK_APP_TOKEN" \
            -e SLACK_CHANNEL_ID="$SLACK_CHANNEL_ID" \
            ghcr.io/${REPO}:latest
